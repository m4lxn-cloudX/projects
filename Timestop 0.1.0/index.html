<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeStop - Main</title>
    <link rel="icon" href="/assets/icon/icon.jpg">
    <style>
    .box {
    text-align: center;
    }
    .body {
    background-color: #F1F0E5
    }
    .NoTextdecoration {
    text-decoration: none;
    }
    .black {
    color: black;
    }
    body {
    background-color: #F1F0E5
    }
    .container {
    background-color: #f3f2ed;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 350px;
    height: 400px;
    text-align: left;
    align-items: left;
    border: 2px solid #000;
    border-radius: 14.5px;
    margin: 0 auto;
    padding: 10px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .BtnStartTimer {
    height: 30px;
    width: 100px;
    border-radius: 7.5px;
    margin-right: 10px;
    }
    .BtnStartStopwatch {
    height: 30px;
    width: 135px;
    border-radius: 7.5px;
    margin-left: 10px;
    }
    </style>
</head>
<body>
    <div class="head">
        <br><br><br><br><br><br><br><br><br><br><br>
    </div>
    <div class="main">
        <div class="container">
            <div class="box">
                <h2 class="bolt underlined">Welcome to TimeStop</h2><br><br><br>
                <button class="BtnStartTimer" onclick="GoToStartTimer()">Start a Timer</button>
                <button class="BtnStartStopwatch" onclick="GoToStartStopwatch()">Start a Stopwatch</button>
            </div>
        </div>
    </div>
    <br><br><br><br><br><br><br><br><br><br><br><hr><br>
    <div class="foot">
        <a class ="NoTextdecoration black"> Copyright © 2026 TimeStop Ltd. All  rights reserved.</a><br>
        <a class="NoTextdecoration black" >Timestop 0.1.0</a>
    </div>
</body>
    <script>
    function GoToStartTimer() {
    window.location.href = '/base/timer/';
    }
    function GoToStartStopwatch() {
    window.location.href = '/base/stopwatch/';
    }
    </script>
</html>
