<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TimeStop - Stopwatch</title>
    <link rel="icon" href="/assets/icon/icon.jpg">
    <style>
    .body {
    background-color: #F1F0E5
    }
    .NoTextdecoration {
    text-decoration: none;
    }
    .black {
    color: black;
    }
    body {
    background-color: #F1F0E5
    }
    .container {
    background-color: #f3f2ed;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 350px;
    height: 400px;
    text-align: left;
    align-items: left;
    border: 2px solid #000;
    border-radius: 14.5px;
    margin: 0 auto;
    padding: 10px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    }
    .BtnStartTimer {
    height: 30px;
    width: 100px;
    border-radius: 7.5px;
    margin-right: 10px;
    }
    .BtnStartStopwatch {
    height: 30px;
    width: 135px;
    border-radius: 7.5px;
    margin-left: 10px;
    }
    .btnBackToMain {
    height: 35px;
    width: 135px;
    border-radius: 7.5px;
    margin-left: 10px;
    }
    .display {
    font-size: 48px;
    font-family: monospace;
    text-align: center;
    margin-bottom: 20px;
    }
    .box {
    text-align: center;
    }
    .btn {
    height: 40px;
    width: 72.5px;
    border-radius: 7.5px;
    margin: 5px;
    font-size: 16px;
    }
    .laps {
    list-style-type: none;
    padding: 0;
    margin: 0;
    max-height: 150px;
    overflow-y: auto;
    font-family: monospace;
    font-size: 14px;
    }
    .laps li {
    padding: 5px;
    border-bottom: 1px solid #ccc;
    }
    </style>
</head>
<body>
    <div class="head">
        <br><br><br><br><br><br><br><br><br><br><br>
    </div>
    <div class="main">
        <div class="container">
            <div class="box">
                <div id="display" class="display">00:00:00.000</div>
                <br>
                <button class="btn" id="startBtn" onclick="startStopwatch()">Start</button>
                <button class="btn" id="stopBtn" onclick="stopStopwatch()">Stop</button>
                <button class="btn" id="resetBtn" onclick="resetStopwatch()">Reset</button>
                <button class="btn" id="lapBtn" onclick="recordLap()">Lap</button>
                <br>
                <ul id="laps" class="laps"></ul><br><br>
                <button class="btnBackToMain" onclick="BackToMain()">Back to Home</button>
            </div>
        </div>
    </div>
    <br><br><br><br><br><br><br><br><br><br><br><hr><br>
    <div class="foot">
        <a class ="NoTextdecoration black"> Copyright © 2026 TimeStop Ltd. All  rights reserved.</a><br>
        <a class="NoTextdecoration black" >Timestop 0.1.1</a>
    </div>
    <script>
    function BackToMain() {
    window.location.href = '/';
    }
    let startTime = 0;
    let elapsedTime = 0;
    let timerInterval;
    let isRunning = false;
    let laps = [];
    function startStopwatch() {
        if (!isRunning) {
            startTime = Date.now() - elapsedTime;
            timerInterval = setInterval(updateDisplay, 10);
            isRunning = true;
        }
    }
    function stopStopwatch() {
        if (isRunning) {
            clearInterval(timerInterval);
            elapsedTime = Date.now() - startTime;
            isRunning = false;
        }
    }
     function resetStopwatch() {
        clearInterval(timerInterval);
        startTime = 0;
        elapsedTime = 0;
        isRunning = false;
        laps = [];
        updateDisplay();
        updateLaps();
    }
    function recordLap() {
        if (isRunning) {
            let lapTime = Date.now() - startTime;
            laps.push(lapTime);
            updateLaps();
        }
    }
    function updateDisplay() {
        let currentTime = isRunning ? Date.now() - startTime : elapsedTime;
        let milliseconds = Math.floor(currentTime % 1000);
        let seconds = Math.floor((currentTime / 1000) % 60);
        let minutes = Math.floor((currentTime / (1000 * 60)) % 60);
        let hours = Math.floor(currentTime / (1000 * 60 * 60));

        let displayTime = 
            (hours < 10 ? '0' : '') + hours + ':' +
            (minutes < 10 ? '0' : '') + minutes + ':' +
            (seconds < 10 ? '0' : '') + seconds + '.' +
            milliseconds.toString().padStart(3, '0');

        document.getElementById('display').textContent = displayTime;
    }
    function updateLaps() {
        let lapsList = document.getElementById('laps');
        lapsList.innerHTML = '';
        laps.forEach((lap, index) => {
            let li = document.createElement('li');
            let cumulative = formatTime(lap);
            let difference = index === 0 ? lap : lap - laps[index - 1];
            let diffFormatted = formatTime(difference);
            li.textContent = `Lap ${index + 1}: ${cumulative} (+${diffFormatted})`;
            lapsList.appendChild(li);
        });
    }
    function formatTime(time) {
        let milliseconds = Math.floor(time % 1000);
        let seconds = Math.floor((time / 1000) % 60);
        let minutes = Math.floor((time / (1000 * 60)) % 60);
        let hours = Math.floor(time / (1000 * 60 * 60));

        return (hours < 10 ? '0' : '') + hours + ':' +
            (minutes < 10 ? '0' : '') + minutes + ':' +
            (seconds < 10 ? '0' : '') + seconds + '.' +
            milliseconds.toString().padStart(3, '0');
    }
    updateDisplay();
    </script>
</body>
</html>
