<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MazeBank | HOME</title>
    <link rel="stylesheet" href="assets/css/header.css">
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/footer.css">
    <link rel="icon" href="assets/img/icon.jpg">
</head>
<body>
    <div class="header">
        <div class="logo-container" onclick="location.href='/'">
            <img class="logo" src="assets/img/icon.jpg" alt="Logo">
            <a>MazeBank</a>
        </div>
        <div class="username">
            <a>Welcome,</a>
            <a style="font-weight: bold;">User Name</a>
        </div>
        <div class="balance">
            <a>Account Balance:&nbsp;</a>
            <a style="font-weight: bold;">$123,456.56</a>
        </div>
    </div>
    <div class="main">
        <div class="services">
            <h1>Choose a Service:</h1>
            <button class="button" onclick="location.href='services/withdraw/'">Withdraw</button>
            <button class="button" onclick="location.href='services/deposit/'">Deposit</button>
            <button class="button" onclick="location.href='services/transaction-log/'">Transaction Log</button>
        </div>
        <br>
    </div>

    </div>
